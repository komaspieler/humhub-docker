name: Docker Publish Nightly Image CI
on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to build'
        required: true
        type: string
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Resolve branch and tag
      id: resolve
      run: |
        REF="${{ inputs.ref || github.ref_name }}"
        case "$REF" in
          main)    TAG="stable-nightly";       HUMHUB_BRANCH="master"  ;;
          develop) TAG="experimental-nightly"; HUMHUB_BRANCH="develop" ;;
          *)       TAG="${REF#v}-nightly";     HUMHUB_BRANCH="$REF" ;;
        esac
        echo "ref=$REF"                     >> $GITHUB_OUTPUT
        echo "tag=$TAG"                     >> $GITHUB_OUTPUT
        echo "humhub_branch=$HUMHUB_BRANCH" >> $GITHUB_OUTPUT

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.resolve.outputs.ref }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Generate immutable tag
      id: immutable
      run: |
        TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
        GIT_SHA=$(git ls-remote https://github.com/humhub/humhub.git refs/heads/${{ steps.resolve.outputs.humhub_branch }} | cut -c1-7)
        echo "value=${{ steps.resolve.outputs.tag }}-${TIMESTAMP}-${GIT_SHA}" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: image
        file: image/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          HUMHUB_GIT_BRANCH=${{ steps.resolve.outputs.humhub_branch }}
        tags: |
          humhub/humhub:${{ steps.resolve.outputs.tag }}
          humhub/humhub:${{ steps.immutable.outputs.value }}
