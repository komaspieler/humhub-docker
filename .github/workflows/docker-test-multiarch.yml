name: Test Multi-Arch Build
on:
  workflow_dispatch:
    inputs:
      humhub_branch:
        description: 'HumHub branch or tag to build (e.g. develop, v1.18.2)'
        required: false
        default: 'develop'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push platform image
      uses: docker/build-push-action@v6
      with:
        context: image
        file: image/Dockerfile
        platforms: ${{ matrix.platform }}
        push: true
        build-args: |
          HUMHUB_GIT_BRANCH=${{ inputs.humhub_branch }}
        tags: |
          ghcr.io/${{ github.repository }}:test-${{ matrix.suffix }}
          ghcr.io/${{ github.repository }}:test-${{ github.run_id }}-${{ matrix.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push combined manifest
      run: |
        docker buildx imagetools create \
          --tag ghcr.io/${{ github.repository }}:test-multiarch \
          --tag ghcr.io/${{ github.repository }}:test-multiarch-${{ github.run_id }} \
          ghcr.io/${{ github.repository }}:test-amd64 \
          ghcr.io/${{ github.repository }}:test-arm64
