name: Test Multi-Arch Build
on:
  workflow_dispatch:
    inputs:
      humhub_branch:
        description: 'HumHub branch or tag to build (e.g. develop, v1.18.2)'
        required: false
        default: 'develop'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push to ghcr.io
      uses: docker/build-push-action@v6
      with:
        context: image
        file: image/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          HUMHUB_GIT_BRANCH=${{ inputs.humhub_branch }}
        tags: |
          ghcr.io/${{ github.repository }}:test-multiarch
          ghcr.io/${{ github.repository }}:test-multiarch-${{ github.run_id }}
