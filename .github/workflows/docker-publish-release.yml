name: Docker Publish Release Image CI
on:
  workflow_call:
    inputs:
      release_tag:
        description: 'HumHub release tag (e.g. v1.18.2, v1.19.0-beta.1)'
        required: true
        type: string
      target_commitish:
        description: 'Branch the release was cut from in humhub/humhub (e.g. master, develop, v1.17)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'HumHub release tag (e.g. v1.18.2, v1.19.0-beta.1)'
        required: true
        type: string
      target_commitish:
        description: 'Branch the release was cut from in humhub/humhub (e.g. master, develop, v1.17)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Resolve build parameters
      id: resolve
      run: |
        RELEASE_TAG="${{ inputs.release_tag }}"
        VERSION="${RELEASE_TAG#v}"                    # e.g. 1.19.0-beta.1 or 1.18.2
        MINOR=$(echo "$VERSION" | cut -d. -f1-2)      # e.g. 1.19 or 1.18

        # Releases from develop are always betas. Releases from master are new
        # stable releases that also receive the stable tag. All other targets
        # are maintenance releases built from their corresponding version branch.
        if [[ "${{ inputs.target_commitish }}" == "develop" ]]; then
          IS_BETA="true"
          DOCKER_BRANCH="develop"
          PUSH_STABLE="false"
        elif [[ "${{ inputs.target_commitish }}" == "master" ]]; then
          IS_BETA="false"
          DOCKER_BRANCH="main"
          PUSH_STABLE="true"
        else
          IS_BETA="false"
          DOCKER_BRANCH="${{ inputs.target_commitish }}"
          PUSH_STABLE="false"
        fi

        echo "release_tag=$RELEASE_TAG"         >> $GITHUB_OUTPUT
        echo "version=$VERSION"                 >> $GITHUB_OUTPUT
        echo "minor=$MINOR"                     >> $GITHUB_OUTPUT
        echo "docker_branch=$DOCKER_BRANCH"     >> $GITHUB_OUTPUT
        echo "is_beta=$IS_BETA"                 >> $GITHUB_OUTPUT
        echo "push_stable=$PUSH_STABLE"         >> $GITHUB_OUTPUT

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.resolve.outputs.docker_branch }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Generate immutable tag
      id: immutable
      run: |
        TIMESTAMP=$(date -u '+%Y%m%d%H%M%S')
        GIT_SHA=$(git ls-remote https://github.com/humhub/humhub.git "refs/tags/${{ steps.resolve.outputs.release_tag }}" | cut -c1-7)
        echo "value=${{ steps.resolve.outputs.version }}-${TIMESTAMP}-${GIT_SHA}" >> $GITHUB_OUTPUT

    - name: Compute tags
      id: tags
      run: |
        TAGS="humhub/humhub:${{ steps.resolve.outputs.version }}"
        TAGS="$TAGS\nhumhub/humhub:${{ steps.immutable.outputs.value }}"
        TAGS="$TAGS\nhumhub/humhub:${{ steps.resolve.outputs.minor }}-beta"
        if [[ "${{ steps.resolve.outputs.is_beta }}" == "false" ]]; then
          TAGS="$TAGS\nhumhub/humhub:${{ steps.resolve.outputs.minor }}"
        fi
        if [[ "${{ steps.resolve.outputs.push_stable }}" == "true" ]]; then
          TAGS="$TAGS\nhumhub/humhub:stable"
        fi
        {
          echo "value<<EOF"
          printf "$TAGS\n"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: image
        file: image/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          HUMHUB_GIT_BRANCH=${{ steps.resolve.outputs.release_tag }}
        tags: ${{ steps.tags.outputs.value }}
