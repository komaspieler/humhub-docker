# This workflow is intentionally executed on the main branch only.
# GitHub Actions cron schedules always run from the default branch (main),
# so this file is ignored on all other branches even if present there.
name: Docker Cleanup CI
on:
  # schedule disabled — this is a personal fork, not the upstream deployment
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Clean up unused images
      env:
        DOCKERHUB_NAMESPACE: humhub
        DOCKERHUB_REPOSITORY: humhub
        DOCKERHUB_USERNAME: ${{secrets.DOCKER_USER}}
        DOCKERHUB_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: bash image/files/dockerhub-cleanup-unused.sh
